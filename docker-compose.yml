services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: imagesearch
      POSTGRES_PASSWORD: imagesearch
      POSTGRES_DB: imagesearch
    ports:
      - "5434:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U imagesearch"]
      interval: 5s
      timeout: 3s
      retries: 5

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    environment:
      QDRANT__SERVICE__GRPC_PORT: 6334

volumes:
  pgdata:
  qdrant_data:
